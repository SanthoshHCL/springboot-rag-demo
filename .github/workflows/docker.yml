name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Java 17 (Temurin distribution)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build the Spring Boot JAR using Maven wrapper inside complete/
      - name: Build JAR
        run: ./complete/mvnw -f complete/pom.xml clean package

      # Log in to GHCR using GitHub Actions built-in token
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Build Docker image (Dockerfile is at project root, but JAR is in complete/target)
      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}/springboot-rag-demo:latest -f Dockerfile .

      # Push Docker image to GHCR
      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}/springboot-rag-demo:latest
